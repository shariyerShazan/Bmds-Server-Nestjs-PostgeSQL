name: CI/CD

on:
  push:
    branches: [main]

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/bmds-server

jobs:
  # ─── Job 1: Install & Build ───────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          # prisma generate only reads the schema — no real DB needed
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/placeholder

      - name: Build
        run: npm run build

  # ─── Job 2: Docker Build & Push ───────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 3: Deploy to Server ──────────────────────────────────────────────
  deploy:
    name: Deploy to Server
    runs-on: ubuntu-latest
    needs: docker
    env:
      SSH_PORT: ${{ secrets.SERVER_PORT || '22' }}
    steps:
      - uses: actions/checkout@v4

      - name: Copy docker-compose.yaml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ env.SSH_PORT }}
          source: docker-compose.yaml
          target: ~/bmds-app

      - name: Pull, restart and prune on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ env.SSH_PORT }}
          script: |
            cd ~/bmds-app

            # Inject the Docker Hub image name into the .env so compose uses it
            sed -i '/^DOCKER_IMAGE=/d' .env
            echo "DOCKER_IMAGE=${{ env.IMAGE_NAME }}:latest" >> .env

            docker pull ${{ env.IMAGE_NAME }}:latest
            docker compose down
            docker compose up -d
            docker system prune -af
